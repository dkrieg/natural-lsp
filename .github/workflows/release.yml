name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        type: boolean
        default: false

# Least privilege: this release workflow legitimately needs write to create
# the git tag and GitHub Release. Nothing else is granted.
permissions:
  contents: write

# Serialize releases so two cannot run at once. Never cancel an in-flight
# release — a half-published tag/release is worse than waiting.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION'. Expected format like v1.2.3 (optionally with a -prerelease/.build suffix)."
            exit 1
          fi
          echo "Version '$VERSION' is valid."

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Ensure tag does not already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "::error::Tag '$VERSION' already exists."
            exit 1
          fi
          echo "Tag '$VERSION' is available."

      - name: Set up Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: "1.26"
          cache: true

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Build release artifacts
        run: just release "${{ inputs.version }}"

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_flag=""
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ inputs.version }}" \
            dist/natural-lsp-* dist/checksums.txt \
            --title "${{ inputs.version }}" \
            --generate-notes \
            $prerelease_flag
