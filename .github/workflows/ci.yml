name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # Skip redundant runs on main when only docs/tooling changed.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"

# Least privilege: the CI job only needs to read repository contents.
permissions:
  contents: read

# Cancel superseded runs for the same ref (e.g. new pushes to an open PR),
# but never cancel in-progress runs on main.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: "1.26"
          # Enables module download + build caching keyed on go.sum.
          cache: true

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      # Single source of truth: the same `just verify` gate runs locally
      # (pre-push hook) and here. The recipe chains
      # fmt-check -> vet -> build -> unit (-race) -> integration.
      - name: Verify (just verify)
        run: just verify
