# Sample .natural-lsp.toml — every key shown with its documented default.
# This file is generated by `natural-lsp --init`. Re-parsing it yields the
# built-in defaults, so you only need to keep the keys you actually change.

[workspace]
# Ordered set of Natural object-file extensions to index.
extensions = [".NSP", ".NSN", ".NSS", ".NSC", ".NSM", ".NSL", ".NSG", ".NSA", ".NSH", ".NSD", ".NS4", ".NS7", ".NS3", ".NS8", ".NST"]
# Workspace-relative directory names skipped during indexing.
exclude = ["archive", "backup", ".git"]
# Upper bound, in bytes, on a file the indexer will read; larger files are skipped.
max_file_size = 5000000

# Map additional file extensions to their object type classifications.
# Valid types: program, subprogram, externalsubroutine, copycode, map,
# localdataarea, globaldataarea, parameterdataarea, helproutine, ddm, class,
# function, dialog, adapter, text.
# [workspace.extension_types]
# ".NAT" = "program"

[cache]
# Workspace-relative directory where the serialized index cache is written.
path = ".natural-lsp-cache"

[analysis]
# When true, an unresolvable dynamic call (e.g. CALLNAT #VAR) becomes a
# CALLS_DYNAMIC dependency with caller context preserved instead of being dropped.
flag_dynamic_calls = true
# Minimum identifier length for a token to be a credible dynamic-call candidate.
dynamic_call_min_length = 6

# Library map: map workspace directories to named Natural libraries and declare
# each library's ordered steplib search chain. Empty by default — with no
# libraries the workspace is treated as a single flat namespace.
#
# [[resolution.library]]
# name = "MYAPP"
# path = "src/myapp"
# steplibs = ["COMMON", "SYSTEM"]
